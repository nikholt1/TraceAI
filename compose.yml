
# Starts an Nginx container from the latest official image
# Binds the service to localhost (127.0.0.1) to prevent external network exposure
# Maps host port 80 to container port 80

# Mounts a custom Nginx server configuration into the container
# Mounts frontend static assets into the Nginx web root directory
# to serve the frontend application directly via HTTP
services:
  nginx:
    image: nginx:latest
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./frontend/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/src:/usr/share/nginx/html:ro
